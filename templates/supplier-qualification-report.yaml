template:
  id: supplier-qualification-report
  version: "1.0"
  name: "Supplier Qualification Report"
  description: "Standard qualification assessment for Tier-1 and Tier-2 suppliers"

# ── Intake schema ──────────────────────────────────────────────────────────────
intake:

  # Header fields
  supplier_name:
    type: string
    required: true
    label: "Supplier name"

  supplier_country:
    type: string
    required: true
    label: "Country of operation"

  supplier_contact_name:
    type: string
    required: false
    label: "Supplier contact name"

  supplier_contact_title:
    type: string
    required: false
    label: "Supplier contact title / role"

  commodity_category:
    type: enum
    required: true
    label: "Commodity category"
    values:
      - "Precision machined components"
      - "Electronic assemblies"
      - "Raw materials — metals"
      - "Raw materials — polymers"
      - "Packaging materials"
      - "Logistics services"
      - "Software & IT services"

  duns_number:
    type: string
    required: false
    label: "DUNS number (optional)"

  certifications_held:
    type: multi_enum
    required: false
    label: "Certifications held"
    values:
      - "ISO 9001:2015"
      - "ISO 14001:2015"
      - "IATF 16949"
      - "EN 9100"
      - "ISO 45001"
      - "ISO 27001"
      - "None"

  review_period:
    type: string
    required: true
    label: "Review period (e.g. Q1 2026 / Jan–Mar 2026)"

  evaluator_name:
    type: string
    required: true
    label: "Evaluator name"

  qualification_type:
    type: enum
    required: true
    label: "Qualification type"
    values:
      - "Initial qualification"
      - "Re-qualification"
      - "For-cause review"

  previous_verdict:
    type: enum
    required: false
    label: "Previous qualification verdict"
    values:
      - "Preferred"
      - "Conditional"
      - "Probationary"
      - "Rejected"
    condition: "qualification_type != 'Initial qualification'"

  previous_composite_score:
    type: number
    required: false
    label: "Previous composite score"
    validation: { min: 0.0, max: 5.0 }
    condition: "qualification_type != 'Initial qualification'"

  # Scorecard
  audit_scores:
    type: table
    required: true
    label: "Audit scorecard — adjust weights if needed (must sum to 1.0), then score each criterion 1–5"
    columns:
      - { name: criterion, label: "Criterion",                    type: string,  editable: false }
      - { name: weight,    label: "Weight (must sum to 1.0)",     type: number,  editable: true,
          validation: { min: 0.0, max: 1.0 } }
      - { name: score,     label: "Score (1–5)",                  type: integer,
          validation: { min: 1, max: 5 } }
      - { name: notes,     label: "Evaluator notes",              type: string,  required: false }
    default_rows:
      - { criterion: "Quality management system",           weight: 0.25 }
      - { criterion: "On-time delivery history",            weight: 0.25 }
      - { criterion: "Financial stability",                 weight: 0.20 }
      - { criterion: "Technical / engineering capability",  weight: 0.15 }
      - { criterion: "Corrective action responsiveness",    weight: 0.10 }
      - { criterion: "Sustainability & compliance",         weight: 0.05 }

  # Performance metrics
  otd_rate_pct:
    type: number
    required: true
    label: "On-time delivery rate (%)"
    validation: { min: 0, max: 100 }

  defect_rate_pct:
    type: number
    required: true
    label: "Incoming defect / rejection rate (%)"
    validation: { min: 0, max: 100 }

  invoice_accuracy_pct:
    type: number
    required: true
    label: "Invoice accuracy (%)"
    validation: { min: 0, max: 100 }

  open_ncr_count:
    type: integer
    required: true
    label: "Open NCR count"
    validation: { min: 0 }

  ncr_avg_close_days:
    type: number
    required: false
    label: "Average NCR close time (days)"

  # Previous period metrics (re-qualification and for-cause only)
  prev_otd_rate_pct:
    type: number
    required: false
    label: "Previous period OTD rate (%)"
    validation: { min: 0, max: 100 }
    condition: "qualification_type != 'Initial qualification'"

  prev_defect_rate_pct:
    type: number
    required: false
    label: "Previous period defect rate (%)"
    validation: { min: 0, max: 100 }
    condition: "qualification_type != 'Initial qualification'"

  prev_invoice_accuracy_pct:
    type: number
    required: false
    label: "Previous period invoice accuracy (%)"
    validation: { min: 0, max: 100 }
    condition: "qualification_type != 'Initial qualification'"

  # SLA pass-target overrides — leave blank to use template defaults
  otd_pass_target:
    type: number
    required: false
    label: "OTD pass threshold (%) — blank = 90% default"
    validation: { min: 0, max: 100 }

  defect_pass_target:
    type: number
    required: false
    label: "Defect rate pass threshold (%) — blank = 1.5% default"
    validation: { min: 0, max: 100 }

  invoice_pass_target:
    type: number
    required: false
    label: "Invoice accuracy pass threshold (%) — blank = 95% default"
    validation: { min: 0, max: 100 }

  ncr_count_pass_target:
    type: integer
    required: false
    label: "Max open NCRs to pass — blank = 2 default"
    validation: { min: 0 }

  ncr_close_pass_target:
    type: number
    required: false
    label: "NCR close time pass threshold (days) — blank = 14 default"
    validation: { min: 0 }

  # Risk register
  risk_register:
    type: table
    required: true
    label: "Risk register — add all identified risks"
    min_rows: 1
    columns:
      - name: risk_category
        label: "Category"
        type: enum
        required: true
        values:
          - "Single-source dependency"
          - "Financial instability"
          - "Geopolitical / country risk"
          - "Quality capability gap"
          - "Capacity constraint"
          - "Lead time variability"
          - "IP / data security"
          - "Regulatory / compliance"
          - "Currency / FX exposure"
          - "Force majeure"
          - "Other"
      - { name: risk_item,   label: "Description",      type: string,  required: true }
      - { name: likelihood,  label: "Likelihood (1–5)", type: integer,
          validation: { min: 1, max: 5 } }
      - { name: impact,      label: "Impact (1–5)",     type: integer,
          validation: { min: 1, max: 5 } }
      - { name: owner,       label: "Owner",            type: string,  required: true }
      - { name: mitigation,  label: "Mitigation note",  type: string,  required: false }

  # Corrective actions
  corrective_actions:
    type: table
    required: false
    label: "Corrective action requests (CARs)"
    columns:
      - { name: car_id,      label: "CAR #",       type: string }
      - { name: action_item, label: "Action item",  type: string, required: true }
      - { name: owner,       label: "Owner",        type: string, required: true }
      - { name: due_date,    label: "Due date",     type: date }
      - { name: status,      label: "Status",       type: enum,
          values: ["Open", "In progress", "Closed", "Overdue"] }

# ── Sections ───────────────────────────────────────────────────────────────────
sections:

  - id: supplier_header
    title: "Supplier & Engagement Header"
    order: 1
    content:

      - id: report_header_line
        type: structured_block
        strategy: template_fill
        template: "SQR-{{report_id}} · {{intake.supplier_name}} · {{intake.review_period}}"

      - id: supplier_details
        type: structured_block
        strategy: extractor
        fields:
          - supplier_name
          - supplier_country
          - supplier_contact_name
          - supplier_contact_title
          - commodity_category
          - duns_number
          - certifications_held
          - review_period
          - evaluator_name
          - qualification_type

      - id: issue_date
        type: field
        strategy: calculator
        expression: "today"
        format: "YYYY-MM-DD"
        label: "Issue date"

      - id: qualification_scope
        type: narrative
        strategy: lookup
        source: "qualification_scope_statements[commodity_category]"

  - id: audit_scorecard
    title: "Audit Scorecard"
    order: 2
    content:

      - id: scorecard_table
        type: table
        strategy: extractor
        source: audit_scores
        computed_columns:
          - { name: weighted_score, expression: "score * weight",
              label: "Weighted score", format: "0.00" }

      - id: composite_score
        type: field
        strategy: calculator
        expression: "sum(audit_scores[*].score * audit_scores[*].weight)"
        format: "0.00"
        label: "Composite score"

      - id: qualification_verdict
        type: field
        strategy: classifier
        input: composite_score
        rules:
          - { condition: "composite_score >= 4.0", output: "Preferred" }
          - { condition: "composite_score >= 3.5", output: "Conditional" }
          - { condition: "composite_score >= 2.5", output: "Probationary" }
          - { condition: "composite_score < 2.5",  output: "Rejected" }

      - id: lowest_criterion_name
        type: field
        strategy: calculator
        expression: "min_by(audit_scores, key='weighted_score').criterion"

      - id: lowest_criterion_score
        type: field
        strategy: calculator
        expression: "min_by(audit_scores, key='weighted_score').score"

      - id: lowest_criterion_note
        type: field
        strategy: calculator
        expression: "min_by(audit_scores, key='weighted_score').notes"
        null_value: ""

      - id: points_to_next_tier
        type: field
        strategy: calculator
        expression: |
          qualification_verdict == 'Preferred'    ? 0 :
          qualification_verdict == 'Conditional'  ? round(4.0 - composite_score, 2) :
          qualification_verdict == 'Probationary' ? round(3.5 - composite_score, 2) :
                                                    round(2.5 - composite_score, 2)

      - id: points_above_floor
        type: field
        strategy: calculator
        expression: |
          qualification_verdict == 'Preferred'    ? round(composite_score - 4.0, 2) :
          qualification_verdict == 'Conditional'  ? round(composite_score - 3.5, 2) :
          qualification_verdict == 'Probationary' ? round(composite_score - 2.5, 2) :
                                                    0

      - id: scorecard_summary
        type: narrative
        strategy: narrative_llm
        prompt: |
          Write a 2–3 sentence scorecard summary paragraph.
          Composite score: {{composite_score}} / 5.00 — Verdict: {{qualification_verdict}}
          Points above tier floor: {{points_above_floor}} · Points to next tier: {{points_to_next_tier}}
          Previous composite score: {{previous_composite_score}} (omit if blank; note improved/declined/stable)

          Audit scorecard — cite specific criterion names and their scores in the narrative:
          1. {{scorecard_table[0].criterion}}: score {{scorecard_table[0].score}}/5, weight {{scorecard_table[0].weight}}, weighted {{scorecard_table[0].weighted_score}}
          2. {{scorecard_table[1].criterion}}: score {{scorecard_table[1].score}}/5, weight {{scorecard_table[1].weight}}, weighted {{scorecard_table[1].weighted_score}}
          3. {{scorecard_table[2].criterion}}: score {{scorecard_table[2].score}}/5, weight {{scorecard_table[2].weight}}, weighted {{scorecard_table[2].weighted_score}}
          4. {{scorecard_table[3].criterion}}: score {{scorecard_table[3].score}}/5, weight {{scorecard_table[3].weight}}, weighted {{scorecard_table[3].weighted_score}}
          5. {{scorecard_table[4].criterion}}: score {{scorecard_table[4].score}}/5, weight {{scorecard_table[4].weight}}, weighted {{scorecard_table[4].weighted_score}}
          6. {{scorecard_table[5].criterion}}: score {{scorecard_table[5].score}}/5, weight {{scorecard_table[5].weight}}, weighted {{scorecard_table[5].weighted_score}}

          Lowest: {{lowest_criterion_name}} at {{lowest_criterion_score}}/5
          Evaluator note on lowest: {{lowest_criterion_note}} (omit this line if blank)
          Rules: Reference criterion names from the table above. Do not invent scores or weights not listed. Do not repeat the verdict word verbatim in the first sentence.
          Style: factual, third-person, professional procurement language.
        exemplars:
          - "The supplier achieved a composite score of X.XX, with strongest performance in [high-weight criterion at score/5] and a gap in [lowest_criterion_name] at [score]/5.
             [Sentence on margin or trend if previous_composite_score present].
             [Verdict sentence with points-above-floor context]."
        max_tokens: 180

  - id: performance
    title: "Delivery & Quality Performance"
    order: 3
    content:

      - id: performance_table
        type: table
        strategy: extractor
        fields:
          - otd_rate_pct
          - defect_rate_pct
          - invoice_accuracy_pct
          - open_ncr_count
          - ncr_avg_close_days

      - id: otd_effective_pass
        type: field
        strategy: calculator
        expression: "otd_pass_target or sla_thresholds.otd_rate_pct.pass"

      - id: defect_effective_pass
        type: field
        strategy: calculator
        expression: "defect_pass_target or sla_thresholds.defect_rate_pct.pass"

      - id: invoice_effective_pass
        type: field
        strategy: calculator
        expression: "invoice_pass_target or sla_thresholds.invoice_accuracy_pct.pass"

      - id: ncr_count_effective_pass
        type: field
        strategy: calculator
        expression: "ncr_count_pass_target or sla_thresholds.open_ncr_count.pass"

      - id: ncr_close_effective_pass
        type: field
        strategy: calculator
        expression: "ncr_close_pass_target or sla_thresholds.ncr_avg_close_days.pass"

      - id: otd_sla_status
        type: field
        strategy: calculator
        expression: "otd_rate_pct >= otd_effective_pass ? 'Pass' : otd_rate_pct >= sla_thresholds.otd_rate_pct.watch ? 'Watch' : 'Breach'"

      - id: defect_sla_status
        type: field
        strategy: calculator
        expression: "defect_rate_pct <= defect_effective_pass ? 'Pass' : defect_rate_pct <= sla_thresholds.defect_rate_pct.watch ? 'Watch' : 'Breach'"

      - id: invoice_sla_status
        type: field
        strategy: calculator
        expression: "invoice_accuracy_pct >= invoice_effective_pass ? 'Pass' : invoice_accuracy_pct >= sla_thresholds.invoice_accuracy_pct.watch ? 'Watch' : 'Breach'"

      - id: ncr_count_sla_status
        type: field
        strategy: calculator
        expression: "open_ncr_count <= ncr_count_effective_pass ? 'Pass' : open_ncr_count <= sla_thresholds.open_ncr_count.watch ? 'Watch' : 'Breach'"

      - id: ncr_close_sla_status
        type: field
        strategy: calculator
        expression: "ncr_avg_close_days <= ncr_close_effective_pass ? 'Pass' : ncr_avg_close_days <= sla_thresholds.ncr_avg_close_days.watch ? 'Watch' : 'Breach'"
        null_value: "N/A"

      - id: otd_trend
        type: field
        strategy: calculator
        expression: "otd_rate_pct > prev_otd_rate_pct ? 'improving' : otd_rate_pct < prev_otd_rate_pct ? 'declining' : 'stable'"
        condition: "prev_otd_rate_pct is not None"
        null_value: ""

      - id: defect_trend
        type: field
        strategy: calculator
        expression: "defect_rate_pct < prev_defect_rate_pct ? 'improving' : defect_rate_pct > prev_defect_rate_pct ? 'declining' : 'stable'"
        condition: "prev_defect_rate_pct is not None"
        null_value: ""

      - id: invoice_trend
        type: field
        strategy: calculator
        expression: "invoice_accuracy_pct > prev_invoice_accuracy_pct ? 'improving' : invoice_accuracy_pct < prev_invoice_accuracy_pct ? 'declining' : 'stable'"
        condition: "prev_invoice_accuracy_pct is not None"
        null_value: ""

      - id: performance_narrative
        type: narrative
        strategy: narrative_llm
        prompt: |
          Write a 2–3 sentence performance narrative.
          OTD: {{otd_rate_pct}}% (target ≥{{otd_effective_pass}}%, status: {{otd_sla_status}}, trend: {{otd_trend}})
          Defect rate: {{defect_rate_pct}}% (target ≤{{defect_effective_pass}}%, status: {{defect_sla_status}}, trend: {{defect_trend}})
          Invoice accuracy: {{invoice_accuracy_pct}}% (target ≥{{invoice_effective_pass}}%, status: {{invoice_sla_status}}, trend: {{invoice_trend}})
          Open NCRs: {{open_ncr_count}} (target ≤{{ncr_count_effective_pass}}, status: {{ncr_count_sla_status}})
          NCR avg close: {{ncr_avg_close_days}} days (target ≤{{ncr_close_effective_pass}} days, status: {{ncr_close_sla_status}})
          Lead with the most significant breach or concern.
          If trend data is present (not blank), note whether performance is improving or declining.
          If all metrics pass, note overall satisfactory performance.
          Style: factual, third-person.
        max_tokens: 160

  - id: risk_assessment
    title: "Risk Assessment"
    order: 4
    content:

      - id: risk_register_table
        type: table
        strategy: extractor
        source: risk_register
        sort_by: { field: priority_score, order: desc }
        computed_columns:
          - { name: priority_score, expression: "likelihood * impact",
              label: "Priority score" }

      - id: overall_risk_tier
        type: field
        strategy: classifier
        input: "max(risk_register[*].priority_score)"
        rules:
          - { condition: "max_priority >= 15", output: "High" }
          - { condition: "max_priority >= 8",  output: "Medium" }
          - { condition: "max_priority < 8",   output: "Low" }

      - id: second_risk_item
        type: field
        strategy: calculator
        expression: "risk_register[1].risk_item if len(risk_register) > 1 else 'No additional risks identified'"

      - id: second_risk_category
        type: field
        strategy: calculator
        expression: "risk_register[1].risk_category if len(risk_register) > 1 else ''"

      - id: second_risk_priority
        type: field
        strategy: calculator
        expression: "risk_register[1].priority_score if len(risk_register) > 1 else 0"

      - id: second_risk_mitigation
        type: field
        strategy: calculator
        expression: "risk_register[1].mitigation if len(risk_register) > 1 else ''"

      - id: risk_narrative
        type: narrative
        strategy: narrative_llm
        prompt: |
          Write a 2–3 sentence risk narrative.
          Overall risk tier: {{overall_risk_tier}}
          Top risks by priority score (sorted highest first):
          Risk 1: [{{risk_register[0].risk_category}}] {{risk_register[0].risk_item}}
            Likelihood {{risk_register[0].likelihood}} x impact {{risk_register[0].impact}} = priority {{risk_register[0].priority_score}}
            Mitigation: {{risk_register[0].mitigation}}
          Risk 2: [{{second_risk_category}}] {{second_risk_item}} — priority {{second_risk_priority}}
            Mitigation: {{second_risk_mitigation}}
          (Omit Risk 2 if second_risk_category is blank or second_risk_item is "No additional risks identified")
          Lead with the risk category to frame the type of exposure for Risk 1 (e.g. "a single-source dependency risk", "a geopolitical risk").
          State the specific risk item and report the mitigation text exactly as written above — do not add consequences, timelines, or supply impacts not stated in the mitigation field.
          If Risk 2 is present, name it in the final sentence with its priority score.
          Style: factual, risk-management register language.
        max_tokens: 150

      - id: risk_disclosure
        type: narrative
        strategy: lookup
        source: risk_disclosure_clause

  - id: corrective_actions
    title: "Corrective Actions & Conditions"
    order: 5
    content:

      - id: approval_conditions
        type: narrative
        strategy: classifier
        input: qualification_verdict
        source: "approval_conditions_blocks[qualification_verdict]"
        condition: "qualification_verdict != 'Preferred'"

      - id: rejection_remediation_notes
        type: narrative
        strategy: direct_input
        condition: "qualification_verdict == 'Rejected'"
        label: "Remediation requirements before re-qualification"
        hint: "List the specific actions the supplier must complete before submitting for re-qualification."

      - id: car_table
        type: table
        strategy: extractor
        source: corrective_actions

      - id: overdue_car_count
        type: field
        strategy: calculator
        expression: "count(corrective_actions, status='Overdue')"

      - id: car_summary
        type: narrative
        strategy: narrative_llm
        prompt: |
          Write a 2–3 sentence CAR summary paragraph.
          Verdict: {{qualification_verdict}}
          Total CARs: {{count(corrective_actions)}} · Open: {{count(corrective_actions, status='Open')}} · Overdue: {{overdue_car_count}}
          Earliest due date: {{min(corrective_actions[*].due_date)}}

          CAR details — reference specific CAR IDs and action items in the narrative:
          CAR-1: {{corrective_actions[0].car_id}} — {{corrective_actions[0].action_item}} (owner: {{corrective_actions[0].owner}}, due: {{corrective_actions[0].due_date}}, status: {{corrective_actions[0].status}})
          CAR-2: {{corrective_actions[1].car_id}} — {{corrective_actions[1].action_item}} (owner: {{corrective_actions[1].owner}}, due: {{corrective_actions[1].due_date}}, status: {{corrective_actions[1].status}})
          CAR-3: {{corrective_actions[2].car_id}} — {{corrective_actions[2].action_item}} (owner: {{corrective_actions[2].owner}}, due: {{corrective_actions[2].due_date}}, status: {{corrective_actions[2].status}})
          (Skip any CAR line where the ID shows "—" — it means fewer than that many CARs exist)
          If overdue_car_count > 0, name the specific overdue CAR(s) by ID and state they require immediate escalation.
          If verdict is Conditional or Probationary, note that closure of open CARs is required to maintain status.
          Do not state dates or counts not shown above.
        max_tokens: 160
        condition: "count(corrective_actions) > 0"

      - id: car_followup
        type: narrative
        strategy: lookup
        source: car_followup_clause

  - id: summary
    title: "Summary & Recommendation"
    order: 6
    content:

      - id: breach_count
        type: field
        strategy: calculator
        expression: |
          (otd_sla_status == 'Breach' ? 1 : 0) +
          (defect_sla_status == 'Breach' ? 1 : 0) +
          (invoice_sla_status == 'Breach' ? 1 : 0) +
          (ncr_count_sla_status == 'Breach' ? 1 : 0) +
          (ncr_close_sla_status == 'Breach' ? 1 : 0)

      - id: executive_summary
        type: narrative
        strategy: narrative_llm
        prompt: |
          Write a 2–3 sentence executive summary.
          Supplier: {{intake.supplier_name}}
          Commodity: {{intake.commodity_category}}
          Qualification type: {{qualification_type}}
          Composite score: {{composite_score}} / 5.00
          Verdict: {{qualification_verdict}}
          Previous verdict: {{previous_verdict}} (omit if blank)
          Previous composite score: {{previous_composite_score}} (omit if blank)
          Overall risk tier: {{overall_risk_tier}}
          Top risk: [{{risk_register[0].risk_category}}] {{risk_register[0].risk_item}}
          SLA breaches: {{breach_count}} metric(s) in Breach status
          State the verdict clearly in the first sentence.
          If breach_count > 0, note that performance data shows active SLA breaches.
          If this is a re-qualification, compare current score to previous (improving / declining / stable).
        max_tokens: 170

      - id: recommendation
        type: narrative
        strategy: narrative_llm
        prompt: |
          Write a 2–3 sentence procurement recommendation.
          Qualification type: {{qualification_type}}
          Verdict: {{qualification_verdict}}
          Previous verdict: {{previous_verdict}} (omit if blank)
          Open CARs: {{count(corrective_actions, status='Open')}}
          Overall risk tier: {{overall_risk_tier}}
          Action guidance by verdict tier:
            Preferred → maintain as preferred/strategic source, schedule 12-month review
            Conditional → maintain with active CAR monitoring, flag for 6-month re-evaluation
            Probationary → restrict new POs pending CAR closure, initiate secondary source search
            Rejected → halt new POs, place on restricted list, initiate secondary source
          If re-qualification, frame the recommendation relative to the previous status.
        max_tokens: 160

      - id: next_review_date
        type: field
        strategy: calculator
        expression: |
          qualification_verdict == 'Preferred'     ? today + 12_months :
          qualification_verdict == 'Conditional'   ? today + 6_months  :
                                                     today + 3_months

      - id: signatory_block
        type: narrative
        strategy: lookup
        source: signatory_block

# ── SLA thresholds ─────────────────────────────────────────────────────────────
# Edit these values to match the contractual SLA for a specific supplier or category.
# Calculator expressions reference these by name so changing a value here
# updates both the computation and the narrative prompt context.
sla_thresholds:
  otd_rate_pct:         { pass: 90,   watch: 85  }
  defect_rate_pct:      { pass: 1.5,  watch: 3.0 }
  invoice_accuracy_pct: { pass: 95,   watch: 90  }
  open_ncr_count:       { pass: 2,    watch: 4   }
  ncr_avg_close_days:   { pass: 14,   watch: 21  }

# ── Lookup dictionaries ────────────────────────────────────────────────────────
lookup_sources:

  qualification_scope_statements:
    "Precision machined components": >
      This qualification covers the supplier as a source of precision machined
      components for use in capital equipment and sub-assembly applications.
      Assessment conducted per internal procedure SQP-003.
    "Electronic assemblies": >
      This qualification covers the supplier as a source of electronic assemblies
      including PCBAs and cable harnesses. Assessment conducted per SQP-004.
    "Raw materials — metals": >
      This qualification covers the supplier as a source of metallic raw materials
      including bar stock, sheet, and castings. Assessment conducted per SQP-005.
    "Raw materials — polymers": >
      This qualification covers the supplier as a source of polymeric raw materials
      including moulding compounds and sheet goods. Assessment conducted per SQP-006.
    "Packaging materials": >
      This qualification covers the supplier as a source of primary and secondary
      packaging materials. Assessment conducted per SQP-007.
    "Logistics services": >
      This qualification covers the supplier as a provider of freight and logistics
      services including inbound and outbound transportation. Assessment conducted
      per SQP-008.
    "Software & IT services": >
      This qualification covers the supplier as a provider of software and IT
      services. Assessment conducted per SQP-009.

  approval_conditions_blocks:
    "Conditional": >
      Conditional approval is granted subject to resolution of all open CARs
      within the specified due dates. Failure to close CARs by the stated
      deadlines will result in downgrade to Probationary status.
    "Probationary": >
      Probationary status is granted on a time-limited basis. Existing purchase
      orders may continue; no new purchase orders may be raised without explicit
      Procurement Lead sign-off. Full remediation of all open CARs is required
      within the stated due dates. Failure to remediate within 90 days will
      result in Rejected status. Re-evaluation is scheduled within 90 days.
    "Rejected": >
      This supplier does not currently meet qualification criteria. No new purchase
      orders may be raised. Existing orders must be reviewed with the Procurement
      Lead. Re-qualification may be initiated after a minimum 90-day remediation
      period with documented evidence of corrective action.

  risk_disclosure_clause: >
    Risk assessment conducted in accordance with ISO 31000 principles. Scores
    reflect evaluator judgment at time of assessment and are subject to revision
    at subsequent review periods.

  car_followup_clause: >
    CAR progress will be reviewed at the next scheduled supplier business review.
    Overdue CARs will trigger an escalation to the Procurement Lead and may result
    in a change of supplier status.

  signatory_block: >
    Prepared by: {{evaluator_name}} · {{issue_date}}
    Template: supplier-qualification-report v{{template.version}}
    This report was generated by Provenance. All narrative sections are
    subject to evaluator review and approval before this document is considered
    final. Generated report ID: {{report_id}}.

# ── Validation rules ───────────────────────────────────────────────────────────
validation_rules:

  - id: score_weights_sum
    description: "Audit score weights must sum to 1.0"
    check: "abs(sum([r['weight'] for r in audit_scores]) - 1.0) < 0.001"
    severity: error

  - id: verdict_car_consistency
    description: "Non-Preferred verdict should have at least one CAR"
    check: "qualification_verdict == 'Preferred' or len(corrective_actions) >= 1"
    severity: warning
    message: "Verdict is {{qualification_verdict}} but no CARs have been entered. Consider adding corrective actions."

  - id: overdue_car_date_check
    description: "Open or in-progress CARs should not be past their due date"
    check: "all([car['due_date'] >= today for car in corrective_actions if car['status'] in ['Open', 'In progress']])"
    severity: warning
    message: "One or more open CARs have a due date in the past. Update status to Overdue or close the action."

  - id: high_tier_risk_count
    description: "High risk tier should have at least 3 risks documented"
    check: "overall_risk_tier != 'High' or len(risk_register) >= 3"
    severity: warning
    message: "Overall risk tier is High but only {{len(risk_register)}} risk(s) are documented. Consider adding more risks for a complete assessment."

  - id: high_risk_car_coverage
    description: "High-priority risks should have at least one CAR on file"
    check: "not any([r['likelihood'] * r['impact'] >= 15 for r in risk_register]) or len(corrective_actions) >= 1"
    severity: warning
    message: "One or more High-priority risks (priority ≥ 15) are present but no CARs have been entered."

  - id: performance_verdict_alignment
    description: "Breach-level performance should not yield Preferred verdict"
    check: "not (breach_count >= 2 and qualification_verdict == 'Preferred')"
    severity: warning
    message: "Two or more SLA breaches present but verdict is Preferred. Verify scorecard scores reflect performance data."
